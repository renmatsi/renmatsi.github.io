<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renan Matos Portfolio</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* INDEX CARD */
#homeCard {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

.photo {
  width: 100%;
  border-radius: 20px;
}

.info h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.info p {
  opacity: 0.7;
}

/* PORTFOLIO GRID */
.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
}

/* CARD */
.portfolio-card {
  background: #111;
  border-radius: 18px;
  overflow: hidden;
  transition: transform .2s;
}

.portfolio-card:hover {
  transform: translateY(-4px);
}

/* THUMB */
.portfolio-thumb-frame {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
}

.portfolio-thumb-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT */
.card-content {
  padding: 14px;
}

.card-content h3 {
  font-size: 16px;
  margin-bottom: 6px;
}

.card-content p {
  font-size: 12px;
  opacity: 0.6;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}

</style>
</head>

<body>

<div class="container">

  <!-- INDEX -->
  <div id="homeCard">
    <img class="photo" src="https://renmatsi.artstation.com/assets/images/profile.jpg">
    <div class="info">
      <h1>Renan Matos</h1>
      <p>3D Character Artist</p>
    </div>
  </div>

  <!-- PORTFOLIO -->
  <div class="portfolio-grid" id="portfolio"></div>

</div>

<footer id="footer"></footer>

<script>

/* =========================
   DATA
========================= */

const projects = [
  {
    title: "Drone Soldier",
    desc: "Realtime character",
    slides: [
      "https://images.unsplash.com/photo-1",
      "https://images.unsplash.com/photo-2",
      "https://images.unsplash.com/photo-3"
    ]
  },
  {
    title: "Male Character",
    desc: "Realistic sculpt",
    slides: [
      "https://images.unsplash.com/photo-4",
      "https://images.unsplash.com/photo-5"
    ]
  }
];

/* =========================
   RENDER
========================= */

function renderPortfolio() {
  const container = document.getElementById("portfolio");

  container.innerHTML = projects.map(p => `
    <div class="portfolio-card">

      <div class="portfolio-thumb-frame portfolio-slideshow"
           data-slides='${JSON.stringify(p.slides)}'>
        <img class="portfolio-slide"
             src="${p.slides[0]}"
             loading="lazy">
      </div>

      <div class="card-content">
        <h3>${p.title}</h3>
        <p>${p.desc}</p>
      </div>

    </div>
  `).join("");
}

/* =========================
   SLIDES (FIX FINAL)
========================= */

function setupSlides() {
  document.querySelectorAll(".portfolio-slideshow").forEach(el => {

    let slides = JSON.parse(el.dataset.slides);
    let img = el.querySelector("img");

    let i = 0;

    if (slides.length <= 1) return;

    setInterval(() => {
      i = (i + 1) % slides.length;

      img.style.opacity = 0;

      setTimeout(() => {
        img.src = slides[i];
        img.style.opacity = 1;
      }, 150);

    }, 3500);

  });
}

/* =========================
   INIT
========================= */

renderPortfolio();
setupSlides();

/* FOOTER */
document.getElementById("footer").innerText =
  "© Renan Matos TM " + new Date().getFullYear();

</script>

</body>
</html>
