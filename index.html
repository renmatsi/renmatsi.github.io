<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renan Matos</title>


<style>
:root {
  --bg: #f7f7f4;
  --text: #111111;
  --muted: #5f5f5f;
  --card: rgba(255,255,255,0.72);
  --border: rgba(0,0,0,0.12);
  --accent1: #ff4dc4;
  --accent2: #5b7cff;
  --accent3: #00d4aa;
  --success: #28ff7a;
}

body.dark {
  --bg: #070707;
  --text: #f4f4f4;
  --muted: #a8a8a8;
  --card: rgba(14,14,14,0.74);
  --border: rgba(255,255,255,0.14);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 16% 42%, rgba(255,77,196,.12), transparent 32%),
    radial-gradient(circle at 82% 58%, rgba(91,124,255,.10), transparent 34%),
    radial-gradient(circle at 54% 82%, rgba(0,212,170,.08), transparent 36%),
    var(--bg);
  background-size: 220% 220%;
  animation: gradientFlow 58s ease-in-out infinite;
  transition: background .6s ease, color .6s ease;
  overflow-x: hidden;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(120,120,120,.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,120,120,.07) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(circle at center, black, transparent 80%);
  opacity: .18;
}

.top-actions {
  position: fixed;
  top: 26px;
  right: 28px;
  z-index: 50;
  display: flex;
  gap: 10px;
  align-items: center;
}

.circle-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 2px solid transparent;
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3)) border-box;
  backdrop-filter: blur(16px);
  cursor: pointer;
  color: var(--text);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  transition: transform .35s ease, box-shadow .35s ease;
}

.circle-btn:hover {
  transform: scale(1.1) rotate(8deg);
  box-shadow: 0 16px 50px rgba(91,124,255,.25);
}

.lang-wrapper { position: relative; }

.lang-menu {
  position: absolute;
  top: 56px;
  right: 0;
  display: none;
  flex-direction: column;
  gap: 8px;
}

.lang-menu.show { display: flex; }

.lang-menu button {
  color: white;
  font-weight: 700;
}

.lang-en { background: linear-gradient(135deg, #012169, #ffffff 48%, #c8102e) padding-box, linear-gradient(135deg, #012169, #c8102e) border-box; }
.lang-br { background: linear-gradient(135deg, #009c3b, #ffdf00 52%, #002776) padding-box, linear-gradient(135deg, #009c3b, #ffdf00, #002776) border-box; }
.lang-es { background: linear-gradient(135deg, #aa151b, #f1bf00 50%, #aa151b) padding-box, linear-gradient(135deg, #aa151b, #f1bf00) border-box; }

.hero {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 90px 28px 70px;
}

.main-card,
.panel-card {
  position: relative;
  z-index: 2;
  width: min(1120px, 100%);
  padding: 42px;
  border-radius: 42px;
  border: 1px solid var(--border);
  background: var(--card);
  backdrop-filter: blur(26px);
  box-shadow: 0 18px 60px rgba(0,0,0,.12);
  overflow: hidden;
  animation: reveal .75s ease both;
}

.main-card {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 48px;
  align-items: center;
}

.main-card::after,
.panel-card::after {
  content: "";
  position: absolute;
  width: 360px;
  height: 360px;
  left: -120px;
  bottom: -120px;
  background: radial-gradient(circle, rgba(255,77,196,.10), transparent 72%);
  filter: blur(8px);
  pointer-events: none;
}

.photo-wrap {
  position: relative;
  border-radius: 30px;
  padding: 3px;
  background: linear-gradient(135deg, rgba(255,77,196,.85), rgba(91,124,255,.7), rgba(0,212,170,.8));
  box-shadow: 0 18px 54px rgba(255,77,196,.08), 0 14px 48px rgba(91,124,255,.07);
}

.photo {
  width: 100%;
  aspect-ratio: 4 / 5;
  display: block;
  object-fit: cover;
  object-position: center;
  border-radius: 27px;
}

.info { position: relative; z-index: 2; }

.name {
  margin: 0 0 26px;
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(42px, 6vw, 74px);
  line-height: .95;
  letter-spacing: 10px;
  font-weight: 600;
}

.name .renan,
.desc strong,
.panel-title span,
.contact-highlight {
  background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  background-size: 220% 220%;
  animation: textGradient 9s ease infinite;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

@keyframes textGradient {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.name .matos {
  color: color-mix(in srgb, var(--text) 62%, transparent);
}

.divider {
  width: 150px;
  height: 2px;
  margin: 0 0 28px;
  background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3));
  background-size: 220% 220%;
  animation: textGradient 9s ease infinite;
  border-radius: 999px;
}

.desc {
  max-width: 650px;
  font-size: 16px;
  line-height: 1.85;
  color: var(--muted);
}

.open-status {
  position: absolute;
  left: 50%;
  bottom: 16px;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 5;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.32);
  background: rgba(0,0,0,.46);
  color: #fff;
  backdrop-filter: blur(16px);
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  white-space: nowrap;
}

body.dark .open-status {
  background: rgba(255,255,255,.06);
}

.open-dot {
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 rgba(40,255,122,.8);
  animation: pulseGreen 1.65s ease-in-out infinite;
}

@keyframes pulseGreen {
  0%, 100% {
    opacity: .42;
    box-shadow: 0 0 0 0 rgba(40,255,122,.55), 0 0 12px rgba(40,255,122,.45);
  }
  50% {
    opacity: 1;
    box-shadow: 0 0 0 9px rgba(40,255,122,0), 0 0 24px rgba(40,255,122,.85);
  }
}

.nav-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-top: 34px;
}

.nav-buttons button,
.back-btn,
.project-link,
.contact-link,
.copy-btn {
  color: var(--text);
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 13px 18px;
  border-radius: 999px;
  border: 2px solid transparent;
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3)) border-box;
  backdrop-filter: blur(14px);
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: transform .3s ease, box-shadow .3s ease;
}

.nav-buttons button:hover,
.back-btn:hover,
.project-link:hover,
.contact-link:hover,
.copy-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 36px rgba(91,124,255,.22);
}




/* Scroll-aware compact index */

.top-actions {
  opacity: .18;
  transition: opacity .35s ease, transform .35s ease, filter .35s ease;
}

.top-actions:hover,
.top-actions:focus-within {
  opacity: 1;
}

.contact-link {
  display: inline-flex;
  align-items: center;
  gap: 9px;
}

.contact-icon {
  width: 17px;
  height: 17px;
  display: inline-block;
  flex: 0 0 auto;
}

.contact-icon svg {
  width: 100%;
  height: 100%;
  display: block;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.85;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.contact-icon.instagram svg .fill-none {
  fill: none;
}

.contact-icon.linkedin svg text {
  fill: currentColor;
  stroke: none;
  font-family: Arial, sans-serif;
  font-size: 11px;
  font-weight: 700;
}


/* Panel color accents */
#skillsPanel {
  border-color: rgba(77,163,255,.32);
  box-shadow: 0 20px 70px rgba(77,163,255,.055);
}

#skillsPanel .skill-block {
  padding: 20px;
  border-radius: 24px;
  border: 1px solid rgba(77,163,255,.22);
  background: linear-gradient(135deg, rgba(77,163,255,.10), rgba(91,124,255,.05));
}

#skillsPanel .skill-block h3 {
  color: #7fbaff;
}

#experiencePanel {
  border-color: rgba(184,77,255,.32);
  box-shadow: 0 20px 70px rgba(184,77,255,.055);
}

#experiencePanel .resume-item {
  border-color: rgba(184,77,255,.24);
  background: linear-gradient(135deg, rgba(184,77,255,.10), rgba(255,77,196,.05));
}

#experiencePanel .resume-company {
  color: #d48aff;
}

#experiencePanel .resume-role {
  color: #ff8fda;
}

#tutorialsPanel {
  border-color: rgba(150,150,150,.28);
  filter: grayscale(.7);
}

#tutorialsPanel .project-card {
  border-color: rgba(150,150,150,.25);
  background: linear-gradient(135deg, rgba(160,160,160,.10), rgba(90,90,90,.05));
}

#contactPanel {
  border-color: rgba(0,212,170,.34);
  box-shadow: 0 20px 70px rgba(0,212,170,.055);
}

#contactPanel .contact-box,
#contactPanel .contact-message-card {
  padding: 20px;
  border-radius: 26px;
  border: 1px solid rgba(0,212,170,.22);
  background: linear-gradient(135deg, rgba(0,212,170,.10), rgba(40,255,122,.04));
}

#contactPanel .contact-link,
#contactPanel .copy-btn {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #00d4aa, #28ff7a) border-box !important;
}

#contactPanel .contact-icon {
  color: #28ff7a;
}

#portfolioPanel {
  border-color: rgba(255,77,196,.28);
  box-shadow: 0 20px 70px rgba(255,77,196,.045);
}

.portfolio-card:nth-child(4n+1) {
  border-color: rgba(77,163,255,.24);
}

.portfolio-card:nth-child(4n+2) {
  border-color: rgba(184,77,255,.24);
}

.portfolio-card:nth-child(4n+3) {
  border-color: rgba(0,212,170,.24);
}

.portfolio-card:nth-child(4n+4) {
  border-color: rgba(255,77,196,.24);
}

.portfolio-card:nth-child(4n+1) .tag {
  border-color: rgba(77,163,255,.32);
  color: #7fbaff;
}

.portfolio-card:nth-child(4n+2) .tag {
  border-color: rgba(184,77,255,.32);
  color: #d48aff;
}

.portfolio-card:nth-child(4n+3) .tag {
  border-color: rgba(0,212,170,.32);
  color: #28ff7a;
}

.portfolio-card:nth-child(4n+4) .tag {
  border-color: rgba(255,77,196,.32);
  color: #ff8fda;
}



/* High contrast terminal-style themes */
body.terminal-dark {
  --bg: #000000;
  --text: #ffffff;
  --muted: #d0d0d0;
  --card: rgba(0,0,0,.86);
  --border: rgba(255,255,255,.72);
  --accent1: #ffffff;
  --accent2: #ffffff;
  --accent3: #ffffff;
  background: #000000 !important;
  animation: none !important;
}

body.terminal-light {
  --bg: #ffffff;
  --text: #000000;
  --muted: #202020;
  --card: rgba(255,255,255,.92);
  --border: rgba(0,0,0,.76);
  --accent1: #000000;
  --accent2: #000000;
  --accent3: #000000;
  background: #ffffff !important;
  animation: none !important;
}

body.terminal-dark::before,
body.terminal-light::before {
  opacity: .22;
  background-size: 18px 18px;
}

body.terminal-dark .name .renan,
body.terminal-light .name .renan,
body.terminal-dark .desc strong,
body.terminal-light .desc strong,
body.terminal-dark .panel-title span,
body.terminal-light .panel-title span,
body.terminal-dark .contact-highlight,
body.terminal-light .contact-highlight {
  background: none !important;
  -webkit-background-clip: initial;
  background-clip: initial;
  color: var(--text) !important;
  animation: none !important;
}

body.terminal-dark .divider,
body.terminal-light .divider {
  background: var(--text) !important;
  animation: none !important;
}

body.terminal-dark .circle-btn,
body.terminal-light .circle-btn,
body.terminal-dark .scroll-btn,
body.terminal-light .scroll-btn,
body.terminal-dark .nav-buttons button,
body.terminal-light .nav-buttons button,
body.terminal-dark .back-btn,
body.terminal-light .back-btn,
body.terminal-dark .project-link,
body.terminal-light .project-link,
body.terminal-dark .contact-link,
body.terminal-light .contact-link,
body.terminal-dark .copy-btn,
body.terminal-light .copy-btn {
  background: var(--card) !important;
  border-color: var(--border) !important;
  box-shadow: none !important;
  color: var(--text) !important;
  text-shadow: none !important;
}

body.terminal-dark .project-card,
body.terminal-light .project-card,
body.terminal-dark .resume-item,
body.terminal-light .resume-item,
body.terminal-dark .portfolio-card,
body.terminal-light .portfolio-card,
body.terminal-dark .contact-box,
body.terminal-light .contact-box {
  background: var(--card) !important;
  border-color: var(--border) !important;
  box-shadow: none !important;
}

body.terminal-dark .tag,
body.terminal-light .tag {
  color: var(--text) !important;
  border-color: var(--border) !important;
  background: transparent !important;
}

/* Contact individual channel colors */
#contactPanel .contact-link[href^="mailto"],
#sendEmailLink {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #4da3ff, #5b7cff) border-box !important;
}

#contactPanel .contact-link[href*="linkedin"],
#contactPanel .contact-link[href*="linkedin.com"] {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #0a66c2, #4da3ff) border-box !important;
}

#contactPanel .contact-link[href*="artstation"] {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #13aff0, #00d4aa) border-box !important;
}

#contactPanel .contact-link[href*="instagram"] {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #f58529, #dd2a7b, #8134af) border-box !important;
}

#contactPanel .contact-link[href*="wa.me"],
#sendWhatsapp1 {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #25d366, #00d4aa) border-box !important;
}

#contactPanel .contact-link[href*="t.me"],
#sendTelegram {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #229ed9, #5b7cff) border-box !important;
}

#contactPanel .copy-btn {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #b84dff, #ff4dc4) border-box !important;
}

/* Larger temporary portfolio cards */
.portfolio-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 24px;
}

.portfolio-card {
  padding: 20px;
  min-height: 340px;
  transform-origin: center;
}

.portfolio-card:hover {
  transform: translateY(-9px) scale(1.045);
  z-index: 6;
  box-shadow: 0 20px 58px rgba(91,124,255,.16);
}

.portfolio-card h3 {
  font-size: 15px;
  margin-top: 16px;
}

.portfolio-card p {
  color: var(--muted);
  line-height: 1.6;
  font-size: 13px;
  margin: 10px 0 14px;
}

.portfolio-placeholder {
  min-height: 190px;
  transition: transform .35s ease, border-color .35s ease;
}

.portfolio-card:hover .portfolio-placeholder {
  transform: scale(1.02);
  border-color: color-mix(in srgb, var(--text) 42%, transparent);
}

@media (max-width: 1100px) {
  .portfolio-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}




/* Button color system */
.btn-skills,
.btn-exp,
.btn-contact,
.btn-tutorials {
  border: 2px solid transparent;
  background-clip: padding-box, border-box;
}

.btn-skills {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #4da3ff, #5b7cff) border-box !important;
}

.btn-exp {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #b84dff, #ff4dc4) border-box !important;
}

.btn-contact {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #00d4aa, #28ff7a) border-box !important;
}

.btn-tutorials {
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, #555, #888) border-box !important;
}

.btn-skills:hover {
  box-shadow: 0 12px 36px rgba(77,163,255,.35);
}

.btn-exp:hover {
  box-shadow: 0 12px 36px rgba(184,77,255,.35);
}

.btn-contact:hover {
  box-shadow: 0 12px 36px rgba(0,212,170,.35);
}

.btn-tutorials:hover {
  box-shadow: none;
}

.btn-skills,
.btn-exp,
.btn-contact {
  position: relative;
  overflow: hidden;
}

.btn-skills::after,
.btn-exp::after,
.btn-contact::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,.15), transparent);
  opacity: 0;
  transition: opacity .4s ease;
  pointer-events: none;
}

.btn-skills:hover::after,
.btn-exp:hover::after,
.btn-contact:hover::after {
  opacity: 1;
}


/* Correct compact index behavior */
body.index-compact .hero {
  place-items: start center;
  padding-top: 90px;
}

body.index-compact #homeCard {
  min-height: 0;
  width: min(1120px, 100%);
  padding: 18px 24px;
  display: block !important;
  overflow: visible !important;
  transition: padding .35s ease, transform .35s ease, opacity .35s ease;
}

body.index-compact #homeCard .photo-wrap,
body.index-compact #homeCard .name,
body.index-compact #homeCard .divider,
body.index-compact #homeCard .desc {
  display: none !important;
}

body.index-compact #homeCard .info {
  display: block;
  text-align: center;
}

body.index-compact #homeCard .nav-buttons {
  margin-top: 0;
  justify-content: center;
}

body.index-compact #homeCard::after {
  opacity: .18;
}

/* Remove layout forcing from previous compact rules */
body.index-compact .portfolio-strip {
  margin-top: 24px;
}

.nav-buttons button.is-disabled {
  opacity: .42;
  filter: grayscale(1);
  cursor: not-allowed;
  box-shadow: none;
}

.nav-buttons button.is-disabled:hover {
  transform: none;
  box-shadow: none;
}

.scroll-controls {
  position: fixed;
  right: 28px;
  bottom: 28px;
  z-index: 60;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.scroll-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 2px solid transparent;
  background:
    linear-gradient(var(--card), var(--card)) padding-box,
    linear-gradient(135deg, var(--accent1), var(--accent2), var(--accent3)) border-box;
  backdrop-filter: blur(16px);
  cursor: pointer;
  color: var(--text);
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  transition: transform .35s ease, box-shadow .35s ease, opacity .35s ease;
}

.scroll-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 16px 50px rgba(91,124,255,.25);
}

.portfolio-quick-actions {
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--card);
  backdrop-filter: blur(18px);
  box-shadow: 0 12px 38px rgba(0,0,0,.10);
}

.experience-resume {
  display: grid;
  gap: 22px;
}

.resume-item {
  padding: 26px;
  border-radius: 28px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.12);
  backdrop-filter: blur(18px);
}

.resume-head {
  display: grid;
  gap: 7px;
  margin-bottom: 16px;
}

.resume-company {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  margin: 0;
}

.resume-role {
  margin: 0;
  font-weight: 700;
  color: var(--text);
}

.resume-meta {
  margin: 0;
  color: var(--muted);
  font-size: 14px;
}

.resume-item ul {
  margin: 0;
  padding-left: 20px;
  color: var(--muted);
  line-height: 1.8;
}

.portfolio-placeholder {
  width: 100%;
  aspect-ratio: 1 / 1;
  border-radius: 18px;
  border: 1px solid var(--border);
  background:

.portfolio-slideshow {
  position: relative;
}

.portfolio-slide {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: 0;
  opacity: 0;
  animation: portfolioSlideFade 8s ease-in-out infinite;
}

.portfolio-slide:nth-child(1) {
  animation-delay: 0s;
}

.portfolio-slide:nth-child(2) {
  animation-delay: 4s;
}

@keyframes portfolioSlideFade {
  0%, 42% { opacity: 1; transform: scale(1.02); }
  50%, 92% { opacity: 0; transform: scale(1.04); }
  100% { opacity: 1; transform: scale(1.02); }
}


.cody-thumb {
  position: relative;
  overflow: hidden;
  background: #0a0a0a;
}

.cody-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(18px) brightness(.46) saturate(1.05);
  transform: scale(1.22);
}

.cody-face {
  position: relative;
  width: 100%;
  height: 100%;
  object-fit: contain;
  z-index: 2;
  transform: scale(1.12);
  transition: transform .35s ease;
}

.portfolio-card:hover .cody-face {
  transform: scale(1.2);
}


/* COTSA / multi-slide thumbnail fix: one slide at a time with slow side pan */
.portfolio-slideshow .portfolio-slide {
  opacity: 0;
  animation: portfolioSingleSlide 12s ease-in-out infinite;
  transform: translateX(0) scale(1.08);
}

.portfolio-slideshow .portfolio-slide:nth-child(1) {
  animation-delay: 0s;
}

.portfolio-slideshow .portfolio-slide:nth-child(2) {
  animation-delay: 4s;
}

.portfolio-slideshow .portfolio-slide:nth-child(3) {
  animation-delay: 8s;
}

@keyframes portfolioSingleSlide {
  0% {
    opacity: 0;
    transform: translateX(0) scale(1.08);
  }
  6% {
    opacity: 1;
  }
  27% {
    opacity: 1;
    transform: translateX(-8%) scale(1.08);
  }
  33% {
    opacity: 0;
    transform: translateX(-10%) scale(1.08);
  }
  100% {
    opacity: 0;
    transform: translateX(-10%) scale(1.08);
  }
}


/* Stable portfolio slideshow: avoids gray empty frames */
.portfolio-slideshow {
  background: rgba(0,0,0,.22);
}

.portfolio-slideshow .portfolio-slide {
  position: absolute;
  inset: 0;
  width: 112%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  animation: portfolioStableSlide 12s ease-in-out infinite;
  transform: translateX(0) scale(1.04);
  transition: opacity .35s ease;
}

.portfolio-slideshow .portfolio-slide:first-child {
  opacity: 1;
}

.portfolio-slideshow .portfolio-slide:nth-child(1) { animation-delay: 0s; }
.portfolio-slideshow .portfolio-slide:nth-child(2) { animation-delay: 4s; }
.portfolio-slideshow .portfolio-slide:nth-child(3) { animation-delay: 8s; }

@keyframes portfolioStableSlide {
  0% {
    opacity: 0;
    transform: translateX(0) scale(1.04);
  }
  4% {
    opacity: 1;
  }
  30% {
    opacity: 1;
    transform: translateX(-8%) scale(1.04);
  }
  34% {
    opacity: 0;
    transform: translateX(-10%) scale(1.04);
  }
  100% {
    opacity: 0;
    transform: translateX(-10%) scale(1.04);
  }
}

function isVideoMedia(src) {
  return typeof src === "string" && src.toLowerCase().split("?")[0].endsWith(".mp4");
}

function renderPortfolioThumb(item) {
  if (item.video) {
    return `<div class="portfolio-thumb-frame"><video class="portfolio-thumb lazy-video" data-src="${item.video}" muted loop playsinline preload="none"></video></div>`;
  }

  if (item.thumbComposite && item.gallery && item.gallery.length) {
    const bg = item.gallery[item.gallery.length - 1];
    const face = item.gallery[0];
    return `<div class="portfolio-thumb-frame cody-thumb"><img src="${bg}" class="cody-bg" alt="" loading="lazy" decoding="async"><img src="${face}" class="cody-face" alt="${item.title}" loading="lazy" decoding="async"></div>`;
  }

  if (item.slides && item.slides.length) {
    return `<div class="portfolio-thumb-frame portfolio-slideshow">${item.slides.map((src, index) => `<img class="portfolio-slide ${index === 0 ? "active" : ""}" src="${src}" alt="${item.title} slide ${index + 1}" loading="lazy" decoding="async">`).join("")}</div>`;
  }

  if (item.image) {
    const panClass = item.thumbPan === "vertical" ? " thumb-pan-vertical" : "";

}

function renderFake3DViewer(item) {
  const frames = item.viewer || [];
  if (!frames.length) return "";

  return `
    <div class="fake3d-viewer" data-viewer>
      <div class="fake3d-stage">
        <img src="${frames[0]}" alt="${item.title} rotation preview" data-viewer-image>
      </div>
      <div class="fake3d-controls">
        <span>Rotate preview</span>
        <input type="range" min="0" max="${frames.length - 1}" value="0" step="1" data-viewer-range>
        <span>Zoom</span>
        <input type="range" min="100" max="400" value="100" step="5" data-viewer-zoom>
      </div>
    </div>
  `;
}

function initFake3DViewers() {
  document.querySelectorAll("[data-viewer]").forEach(viewer => {
    const frames = getPortfolioItems(currentLang).find(item => item.viewer && item.title === document.getElementById("portfolioDetailTitle").textContent)?.viewer || [];
    const image = viewer.querySelector("[data-viewer-image]");
    const range = viewer.querySelector("[data-viewer-range]");
    const zoom = viewer.querySelector("[data-viewer-zoom]");
    if (!frames.length || !image || !range) return;

    const applyZoom = () => {
      const zoomValue = zoom ? Number(zoom.value) / 100 : 1;
      image.style.transform = `scale(${zoomValue})`;
    };

    const updateFrame = value => {
      const index = Math.max(0, Math.min(frames.length - 1, Number(value)));
      image.src = frames[index];
      applyZoom();
    };

    range.addEventListener("input", () => updateFrame(range.value));
    if (zoom) zoom.addEventListener("input", applyZoom);

    viewer.addEventListener("wheel", event => {
      event.preventDefault();
      const direction = event.deltaY > 0 ? 1 : -1;
      range.value = Math.max(0, Math.min(frames.length - 1, Number(range.value) + direction));
      updateFrame(range.value);
    }, { passive: false });

    let isDragging = false;
    let lastX = 0;

    viewer.addEventListener("pointerdown", event => {
      isDragging = true;
      lastX = event.clientX;
      viewer.setPointerCapture(event.pointerId);
    });

    viewer.addEventListener("pointermove", event => {
      if (!isDragging) return;
      const delta = event.clientX - lastX;
      if (Math.abs(delta) > 18) {
        const direction = delta > 0 ? 1 : -1;
        range.value = Math.max(0, Math.min(frames.length - 1, Number(range.value) + direction));
        updateFrame(range.value);
        lastX = event.clientX;
      }
    });

    viewer.addEventListener("pointerup", () => {
      isDragging = false;
    });
  });
}

document.getElementById("contrastToggle").addEventListener("click", () => {
  const isTerminalDark = document.body.classList.contains("terminal-dark");

  document.body.classList.remove("terminal-dark", "terminal-light");

  if (contrastMode === "off") {
    contrastMode = document.body.classList.contains("dark") ? "terminal-dark" : "terminal-light";
  } else if (isTerminalDark) {
    contrastMode = "terminal-light";
  } else {
    contrastMode = "terminal-dark";
  }

  if (contrastMode === "terminal-dark") {
    document.body.classList.add("terminal-dark", "dark");
  } else {
    document.body.classList.remove("dark");
    document.body.classList.add("terminal-light");
  }

});

function updateCompactIndex() {
  const isMobile = window.matchMedia("(max-width: 920px)").matches;

  // Mobile already uses the compact/light layout via CSS.
  // Avoid toggling layout classes while scrolling on phones, because that causes reflow/jank.
  if (isMobile || !isHomeVisible()) {
    document.body.classList.remove("index-compact");
    return;
  }

  const shouldCompact = window.scrollY > 160;
  document.body.classList.toggle("index-compact", shouldCompact);
}

let __scrollTicking = false;
window.addEventListener("scroll", () => {
  if (!__scrollTicking) {
    window.requestAnimationFrame(() => {
      updateCompactIndex();
      __scrollTicking = false;
    });
    __scrollTicking = true;
  }
}, { passive: true });

window.addEventListener("resize", () => {
  updateCompactIndex();
}, { passive: true });

function setupLazyVideos() {
  const videos = document.querySelectorAll("video.lazy-video");

  if (!("IntersectionObserver" in window)) {
    videos.forEach(video => {
      if (!video.src && video.dataset.src) video.src = video.dataset.src;
      video.load();
    });
    return;
  }

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const video = entry.target;

      if (entry.isIntersecting) {
        if (!video.src && video.dataset.src) {
          video.src = video.dataset.src;
          video.load();
        }

        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } else {
        video.pause();
      }
    });
  }, {
    root: null,
    rootMargin: "160px 0px",
    threshold: 0.15
  });

  videos.forEach(video => observer.observe(video));
}

})();
</script>
